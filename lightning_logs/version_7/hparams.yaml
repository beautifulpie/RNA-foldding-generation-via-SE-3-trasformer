cfg: !!python/object:__main__.Config
  data: !!python/object:__main__.DataConfig
    batch_size: 28
    csv_path: /workspace/4D-Diff-RNA_test_1/metadata/rna_metadata.csv
    eval_batch_size: 5
    filtering:
      max_len: 1000
      min_len: 1
    max_batch_size: 28
    max_num_res_squared: 375000
    max_squared_res: 375000
    min_t: 0.01
    num_eval_lengths: 10
    num_workers: 4
    prefetch_factor: 100
    samples_per_eval_length: 5
  experiment: !!python/object:__main__.ExperimentConfig
    checkpointer: !!python/object:__main__.CheckpointerConfig
      dirpath: ./checkpoints
      filename: test_model
    training:
      aux_loss_weight: 1.0
      loss: bb_atom_loss
  interpolant: !!python/object:__main__.InterpolantConfig
    min_t: 0.01
    rots:
      exp_rate: 10
      sample_schedule: exp
      train_schedule: linear
    sampling:
      num_timesteps: 50
    self_condition: true
    trans:
      sample_schedule: linear
      train_schedule: linear
  model: !!python/object:__main__.ModelConfig
    edge_embed_size: 128
    edge_features: !!python/object:__main__.EdgeFeaturesConfig
      c_p: 128
      c_s: 256
      feat_dim: 64
      num_bins: 22
      num_rbf: 32
      relpos_k: 64
      self_condition: true
      single_bias_transition_n: 2
      use_rbf: true
    ipa: !!python/object:__main__.IPAConfig
      c_hidden: 128
      c_s: 256
      c_z: 128
      no_heads: 8
      no_qk_points: 8
      no_v_points: 12
      num_blocks: 6
      seq_tfmr_num_heads: 4
      seq_tfmr_num_layers: 2
    node_embed_size: 256
    node_features: !!python/object:__main__.NodeFeaturesConfig
      c_pos_emb: 128
      c_s: 256
      c_timestep_emb: 128
      embed_diffuse_mask: false
      max_num_res: 2000
      timestep_int: 1000
    symmetric: false
folding_cfg: null
