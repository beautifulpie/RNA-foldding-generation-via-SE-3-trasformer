data_cfg:
  csv_path: "/workspace/4D-Diff-RNA_test_1/light_Training_data/rna_metadata_debug.csv"
  filtering:
    max_len: 1000
    min_len: 1
  min_t: 0.01
  samples_per_eval_length: 2
  num_eval_lengths: 10
  batch_size: 1
  max_batch_size: 1
  max_squared_res: 32400
  max_num_res_squared: 32400
  eval_batch_size: 1
  num_workers: 23
  prefetch_factor: 2

interpolant:
  min_t: 0.01
  rots:
    train_schedule: "linear"
    sample_schedule: "exp"
    exp_rate: 10
  trans:
    train_schedule: "linear"
    sample_schedule: "linear"
  sampling:
    num_timesteps: 30
  self_condition: true

experiment:
  debug: True
  seed: 110
  num_devices: 2
  warm_start: null
  warm_start_cfg_override: true
  use_swa: false
  batch_ot:
    enabled: true
    cost: "kabsch"
    noise_per_sample: 1
    permute: false
  training:
    min_plddt_mask: null
    loss: "se3_vf_loss"
    bb_atom_scale: 0.1
    trans_scale: 0.1
    translation_loss_weight: 2.0
    t_normalize_clip: 0.9
    rotation_loss_weights: 1.0
    aux_loss_weight: 1.0
    aux_loss_t_pass: 0.25
    tors_loss_scale: 1.0
    num_non_frame_atoms: 0
  wandb:
    name: "Test"
    project: "4D-Diff-for-RNA"
    save_code: false
    tags: []
    mode: "online"
  optimizer:
    lr: 0.0001
  trainer:
    overfit_batches: 0
    min_epochs: 1
    max_epochs: 200
    accelerator: "gpu"
    log_every_n_steps: 1
    deterministic: false
    strategy: "ddp_find_unused_parameters_true"
    check_val_every_n_epoch: 10
    accumulate_grad_batches: 1
  checkpointer:
    dirpath: "ckpt/${experiment.wandb.project}/${experiment.wandb.name}/"
    save_last: True
    save_top_k: 3
    monitor: "train/loss"
    mode: "min"
    every_n_epochs: 40

model:
  node_embed_size: 256
  edge_embed_size: 128
  symmetric: false
  node_features:
    c_s: ${model.node_embed_size}
    c_pos_emb: 128
    c_timestep_emb: 128
    embed_diffuse_mask: false
    max_num_res: 2000
    timestep_int: 1000
    Node_param: "/workspace/4D-Diff-RNA_test_1/node_embedder_param.pickle"
  edge_features:
    single_bias_transition_n: 2
    c_s: ${model.node_embed_size}
    c_p: ${model.edge_embed_size}
    relpos_k: 64
    use_rbf: true
    num_rbf: 32
    feat_dim: 64
    num_bins: 22
    self_condition: true
    Edge_param: "/workspace/4D-Diff-RNA_test_1/edge_embedder_param.pickle"
  ipa:
    c_s: ${model.node_embed_size}
    c_z: ${model.edge_embed_size}
    c_hidden: 128
    no_heads: 3
    no_qk_points: 8
    no_v_points: 12
    seq_tfmr_num_heads: 4
    seq_tfmr_num_layers: 2
    num_blocks: 4


